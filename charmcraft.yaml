name: microcloud-cluster-manager-k8s
type: charm
title: |
  microcloud-cluster-manager-k8s
description: |
  This bundles the microcloud-cluster-manager charm for Kubernetes. MicroCloud Cluster Manager is a tool for viewing and managing multiple MicroCloud deployments
summary: |
  MicroCloud Cluster Manager is a tool for viewing and managing multiple MicroCloud deployments.

base: ubuntu@24.04
build-base: ubuntu@24.04
platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]

parts:
  charm:
    build-packages:
      - cargo
      - libffi-dev
      - libssl-dev
      - pkg-config
      - rustc

assumes:
  - juju >= 3.6
  - k8s-api

containers:
  microcloud-cluster-manager:
    resource: microcloud-cluster-manager-image

resources:
  microcloud-cluster-manager-image:
    type: oci-image
    description: OCI image for MicroCloud Cluster Manager
    upstream-source: ghcr.io/edlerd/microcloud-cluster-manager:0.1

config:
  options:
    cluster-connector-address:
      default: cc.lxd-cm.local:30000
      description: External address of the cluster connector service
      type: string
    oidc-audience:
      default: https://lxd-ui-demo.us.auth0.com/api/v2/
      description: Expected audience value for the application
      type: string
    oidc-client-id:
      default: OZSAeCbqAXZid3LL1gRQEkLXP9KlwZtJ
      description: OpenID Connect client ID
      type: string
    oidc-issuer:
      default: https://lxd-ui-demo.us.auth0.com/
      description: OpenID Connect Discovery URL for the provider
      type: string
    version:
      default: "0.1"
      description: Database version of the application
      type: string

requires:
  certificates:
    interface: tls-certificates
  database:
    interface: postgresql_client
    limit: 1
  ingress:
    interface: ingress
    limit: 1
    optional: true
  send-remote-write:
    interface: prometheus_remote_write
    optional: true
  grafana-metadata:
    interface: grafana_metadata
    optional: true
