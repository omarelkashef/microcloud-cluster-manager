name: PR checks
on: pull_request

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commits:
    name: Canonical CLA signed and Signed-off-by (DCO)
    permissions:
      pull-requests: read # to get list of commits from the PR
    runs-on: ubuntu-latest
    steps:

      - name: Check if CLA signed
        uses: canonical/has-signed-canonical-cla@v2

      - name: Get PR Commits
        id: 'get-pr-commits'
        uses: tim-actions/get-pr-commits@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check that all commits are signed-off
        uses: tim-actions/dco@master
        with:
          commits: ${{ steps.get-pr-commits.outputs.commits }}

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.x

      - name: Lint Backend
        run: make lint-backend

  lint-ui:
    name: Lint UI
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: cd ui && yarn install --immutable

      - name: Lint scss
        run: make lint-ui-scss

      - name: Lint JS
        run: make lint-ui-js

  ui-unit:
    name: Unit test UI
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: cd ui && yarn install --immutable

      - name: Run unit tests
        run: cd ui && yarn test-unit

  build-rock:
    name: Build Rock
    runs-on: ubuntu-latest
    outputs:
      image-name: ${{ steps.rock-to-docker.outputs.image-name }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Tune runner for performance and reliability
        uses: ./.github/actions/tune-runner

      - name: Cache restore permissions
        run: |
          sudo chmod o+wx /root
          sudo mkdir -p /home/runner/.cache/yarn
          sudo chown -R $USER:$USER /home/runner/.cache/yarn

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            /root/go/pkg/mod
          key: go-modules-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-modules-

      - name: Cache yarn modules
        uses: actions/cache@v5
        with:
          path: |
            /home/runner/.cache/yarn
          key: yarn-${{ hashFiles('ui/yarn.lock') }}
          restore-keys: |
            yarn-

      - name: Run Rockcraft
        run: |
          export PATH=$PATH:/snap/bin
          sudo snap install --channel latest/stable --classic rockcraft
          sudo rockcraft pack --destructive-mode --verbosity debug
          # adjust permissions so that files can be cached
          sudo chmod -R a+rX /home/runner/.cache/yarn
          sudo chmod -R a+rX /root/go/pkg/mod

      - name: Move rock to docker daemon
        id: rock-to-docker
        run: |
          make rock-to-docker
          echo "image-name=$(make docker-image-name)" >> $GITHUB_OUTPUT

      - name: Convert docker image to tarbal
        run: make docker-image-to-tarball

      - name: Upload image tarball
        uses: actions/upload-artifact@v6.0.0
        with:
          name: docker-image
          path: microcloud-cluster-manager.tar
          retention-days: 1

  backend-e2e:
    name: Backend E2E tests
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Run backend
        run: |
          test/run-backend.sh &
          curl --head --fail --retry-delay 2 --retry 100 --retry-connrefused --insecure https://localhost:30000

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.x

      - name: Run backend E2E tests
        run: make test-e2e

  ui-e2e:
    name: UI E2E tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: ["chromium", "firefox"]
    steps:

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Run backend
        run: |
          test/run-backend.sh &
          curl --head --fail --retry-delay 2 --retry 100 --retry-connrefused --insecure https://localhost:30000

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          set -eux
          cd ui
          yarn install --immutable
          npx playwright install --with-deps ${{ matrix.browser }}

      - name: Setup for tests
        shell: bash
        env:
          OIDC_USER: cluster-manager-e2e-tests@example.org
          OIDC_PASSWORD: cluster-manager-e2e-password
        run: |
          echo "OIDC_USER=$OIDC_USER" >> ui/.env.local
          echo "OIDC_PASSWORD=$OIDC_PASSWORD" >> ui/.env.local

      - name: Run Playwright tests
        run: make test-ui-e2e PROJECT=${{ matrix.browser }}

      - name: Upload ${{ matrix.browser }} blob reports to be merged
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: blob-report-${{ matrix.browser }}
          path: ui/blob-report
          retention-days: 1

  merge-ui-e2e-reports:
    name: Merge UI E2E reports
    if: always()
    needs: ui-e2e
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download blob reports from GitHub Actions Artifacts
        uses: actions/download-artifact@v7
        with:
          path: blob-reports
          pattern: blob-report-*
          merge-multiple: true

      # NOTE: there is no need to install playwright dependencies since we only need to merge reports here
      - name: Merge into HTML Report
        run: npx playwright merge-reports --reporter html ./blob-reports

      - name: Upload merged report
        uses: actions/upload-artifact@v6.0.0
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3
