apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: cluster-manager-dev

manifests:
  kustomize:
    paths:
    - deployment/k8s/dev
  hooks:
    # NOTE: we want to make sure that certificate is created before the deployment
    # therefore we are not deploying the certificate related resources using kustomize
    before:
      - host:
          command: ["deployment/k8s/base/cert/init-cert.sh"]

deploy:
  statusCheck: true
  statusCheckDeadlineSeconds:	180
  tolerateFailuresUntilDeadline: true

profiles:
- name: docker
  build:
    artifacts:
    - image: microcloud-cluster-manager
      context: .
      docker:
        dockerfile: deployment/docker/dockerfile.dev
        target: dev
        buildArgs:
          BUILD_REF: "development"
        cliFlags:
        - "--rm=true"
      sync:
        infer:
        - 'cmd/'
        - 'config/'
        - 'internal/'
        - 'go.mod'
        - 'go.sum'
  portForward:
  - resourceType: service
    resourceName: management-api-svc
    namespace: default
    port: management-api
    localPort: 9000
  - resourceType: service
    resourceName: cluster-connector-svc
    namespace: default
    port: cluster-conn
    localPort: 9001
  # For debugging purposes, we can connect via pgadmin here
  - resourceType: service
    resourceName: db-svc
    namespace: default
    port: db
    localPort: 5432

- name: debug
  build:
    artifacts:
    - image: microcloud-cluster-manager
      context: .
      docker:
        dockerfile: deployment/docker/dockerfile.dev
        target: debug
        buildArgs:
          BUILD_REF: "development"
          DEBUG: "true"
        cliFlags:
        - "--rm=true"
  portForward:
  - resourceType: deployment
    resourceName: management-api-depl
    namespace: default
    port: management-api
    localPort: 9000
  - resourceType: deployment
    resourceName: cluster-connector-depl
    namespace: default
    port: cluster-conn
    localPort: 9001
  - resourceType: deployment
    resourceName: management-api-depl
    namespace: default
    port: debug  # Debug port exposed by Delve
    localPort: 40000
  - resourceType: deployment
    resourceName: cluster-connector-depl
    namespace: default
    port: debug  # Debug port exposed by Delve
    localPort: 40001
  - resourceType: StatefulSet
    resourceName: db-ss
    namespace: default
    port: db
    localPort: 5432

# NOTE: this profile is for testing builds with rocks, use the docker profile for local development
- name: rock
  build:
    artifacts:
    - image: "microcloud-cluster-manager"
      sync:
        infer:
        - 'cmd/'
        - 'config/'
        - 'internal/'
        - 'go.mod'
        - 'go.sum'
      custom:
        buildCommand: ./deployment/rock/build.sh
        dependencies:
          paths:
            - rockcraft.yaml
      platforms: ["linux/amd64"]
  portForward:
  - resourceType: service
    resourceName: management-api-svc
    namespace: default
    port: management-api
    localPort: 9000
  - resourceType: service
    resourceName: cluster-connector-svc
    namespace: default
    port: cluster-conn
    localPort: 9001
  # For debugging purposes, we can connect via pgadmin here
  - resourceType: service
    resourceName: db-svc
    namespace: default
    port: db
    localPort: 5432
