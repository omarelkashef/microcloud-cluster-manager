# product metadata
name: lxd-cluster-manager
version: "1.0.0"
summary: Canonical LXD Cluster Manager
description: |
  The Canonical LXD Cluster Manager is a tool that allows you to manage multiple LXD clusters from a single interface.
  It provides a REST API for managing LXD clusters, and a web interface for interacting with the API.
license: Apache-2.0

# build metadata
# TODO: figure out why using base: bare causes final output to be empty
# base: bare
# build-base: ubuntu@24.04
base: ubuntu@24.04
platforms:
  amd64:

# entrypoint
services:
  lxd-cluster-manager:
    override: replace
    command: /usr/bin/lxd-cluster-manager
    startup: enabled

# dependencies
parts:
  certificates:
    plugin: nil
    stage-packages:
      - ca-certificates
      - protobuf-compiler

  app-build:
    plugin: go
    source: .
    source-type: local
    build-snaps:
      - go/1.23/stable
      - node/22/stable # need to build ui assets for go embed
    build-packages:
      - make
      - git
    override-build: |
      make build
      install -D -m755 ./cmd/app ${CRAFT_PART_INSTALL}/opt/lxd-cluster-manager/bin/app
    # map binary location in build environment to location in staging environment
    organize:
      opt/lxd-cluster-manager/bin/app: usr/bin/lxd-cluster-manager
    stage-packages:
      - base-files_var
