apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-connector-depl
spec:
  selector:
    matchLabels:
      app: cluster-connector
  template:
    metadata:
      labels:
        app: cluster-connector
    spec:
      containers:
      - name: cluster-connector
        image: microcloud-cluster-manager
        command: ["/usr/bin/microcloud-cluster-manager"]
        ports:
        - name: cluster-conn
          containerPort: 9000
        readinessProbe:
          httpGet:
            path: "/status"
            port: 10000
          initialDelaySeconds: 1
          failureThreshold: 10
          timeoutSeconds: 5
          periodSeconds: 30
        livenessProbe:
          httpGet:
            path: "/status"
            port: 10000
          initialDelaySeconds: 1
          failureThreshold: 10
          timeoutSeconds: 5
          periodSeconds: 30
        envFrom:
        - configMapRef:
            name: config
        env:
        - name: SERVICE
          value: "cluster-connector"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        # mount a volume inside the container, at the path specified
        # this volume will contain the certificate generated by cert-manager for the cluster-connector service
        volumeMounts:
        - name: management-api-cert-volume
          mountPath: "/etc/ssl/management-api"
          readOnly: true
        - name: cluster-connector-cert-volume
          mountPath: "/etc/ssl/cluster-connector"
          readOnly: true
      volumes:
      - name: management-api-cert-volume
        # the certificate is stored in a cluster secret, which will be mounted as a volume in the container
        # the actual .crt and .key file paths are specified in the configmap so that pods may access them by using the environment vars
        secret:
          secretName: management-api-cert-secret
      - name: cluster-connector-cert-volume
        secret:
          secretName: cluster-connector-cert-secret