apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-api-depl
spec:
  selector:
    matchLabels:
      app: management-api
  template:
    metadata:
      labels:
        app: management-api
    spec:
      terminationGracePeriodSeconds: 60
      initContainers:
      - name: init
        image: cluster-manager-img
        envFrom:
        - configMapRef:
            name: config
        env:
        - name: SERVICE
          value: "admin"
      containers:
      - name: management-api
        image: cluster-manager-img
        ports:
        - name: management-api
          containerPort: 9000
        envFrom:
        - configMapRef:
            name: config
        env:
        - name: SERVICE
          value: "management-api"
        # mount a volume inside the container, at the path specified
        # this volume will contain the certificate generated by cert-manager for the management-api service
        volumeMounts:
        - name: management-api-cert-volume
          mountPath: "/etc/ssl/management-api"
          readOnly: true
        - name: cluster-connector-cert-volume
          mountPath: "/etc/ssl/cluster-connector"
          readOnly: true
      volumes:
      - name: management-api-cert-volume
        # the certificate is stored in a cluster secret, which will be mounted as a volume in the container
        # the actual .crt and .key file paths are specified in the configmap so that pods may access them by using the environment vars
        secret:
          secretName: management-api-cert-secret
      - name: cluster-connector-cert-volume
        secret:
          secretName: cluster-connector-cert-secret