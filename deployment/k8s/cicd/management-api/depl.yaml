apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-api-depl
spec:
  selector:
    matchLabels:
      app: management-api
  replicas: 2
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: management-api
    spec:
      initContainers:
      - name: init
        # replace image name with microcloud-cluster-manager:<VERSION>
        image: IMAGE_NAME
        command:
        - /usr/bin/microcloud-cluster-manager
        envFrom:
        - configMapRef:
            name: config
        env:
        - name: SERVICE
          value: admin
      containers:
      - name: management-api
        # replace image name with microcloud-cluster-manager:<VERSION>
        image: IMAGE_NAME
        command:
        - /usr/bin/microcloud-cluster-manager
        ports:
        - name: management-api
          containerPort: 9000
        readinessProbe:
          httpGet:
            path: /status
            port: 10000
          initialDelaySeconds: 1
          failureThreshold: 3
          timeoutSeconds: 5
          periodSeconds: 30
        livenessProbe:
          httpGet:
            path: /status
            port: 10000
          initialDelaySeconds: 1
          failureThreshold: 3
          timeoutSeconds: 5
          periodSeconds: 30
        envFrom:
        - configMapRef:
            name: config
        env:
        - name: SERVICE
          value: management-api
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          limits:
            cpu: 1000m
          requests:
            cpu: 200m
        volumeMounts:
        - mountPath: /etc/ssl/management-api
          name: management-api-cert-volume
          readOnly: true
        - mountPath: /etc/ssl/cluster-connector
          name: cluster-connector-cert-volume
          readOnly: true
      volumes:
      - name: management-api-cert-volume
        secret:
          secretName: management-api-cert-secret
      - name: cluster-connector-cert-volume
        secret:
          secretName: cluster-connector-cert-secret
