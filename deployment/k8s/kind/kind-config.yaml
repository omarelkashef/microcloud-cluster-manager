kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  # for development purposes so we can persist pg data from the cluster on the host machine
  extraMounts:
  - hostPath: /data/postgresql
    containerPath: /data/postgresql
  extraPortMappings:
  - containerPort: 30000
    hostPort: 30000
    protocol: TCP
  - containerPort: 30001
    hostPort: 30001
    protocol: TCP
