global
  daemon

defaults
  mode  http
  timeout connect 500000
  timeout client  500000
  timeout server  500000

frontend cluster_manager_proxy
  bind 0.0.0.0:80
  acl is_health_check path_beg /_status/
  use_backend http_200 if is_health_check
  default_backend go_backend

backend go_backend
  server go_server 0.0.0.0:443 ssl verify none

backend http_200
  http-request return status 200 content-type "text/plain" lf-string "ok"
