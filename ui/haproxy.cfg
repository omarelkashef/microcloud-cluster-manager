global
  daemon

defaults
  mode  http
  timeout connect 500000
  timeout client  500000
  timeout server  500000

frontend site_manager_proxy
  bind BIND_ADDRESS
  acl is_api path_beg /1.0
  acl is_ui path_beg /1.0/ui
  use_backend go_backend if is_api !is_ui
  default_backend ui_serve

backend ui_serve
  server ui_server 127.0.0.1:3000

backend go_backend
  http-request replace-header Host .* 0.0.0.0:9001
  server go_server SITE_MANAGER_BACKEND_IP:9001 ssl verify none
